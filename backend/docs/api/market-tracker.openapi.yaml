openapi: 3.1.0
info:
  title: Market Tracker API
  version: 0.1.0-draft
  description: |
    Contract-first REST API draft derived from:
    - backend/docs/Market Tracker.md
    - backend/docs/DB_SCHEMA.md
    - backend/docs/EVENT_LOGIC.md
    - backend/docs/BE_ARCHITECTURE.md

    Design assumptions:
    - All routes are scoped by `workspace_id`.
    - Public identifiers use `tracker_code`, `job_code`, `event_code`, and `digest_code`.
    - Responses are built from normalized read models, not raw provider payloads.
    - Category tracking is fixed to Top 50, with Top 10 alerting as a secondary signal.
servers:
  - url: https://api.example.com
    description: Placeholder server
tags:
  - name: dashboard
    description: Aggregated read models for dashboards and summaries.
  - name: category-trackers
    description: CRUD and read APIs for Top 50 category monitoring.
  - name: competitor-trackers
    description: CRUD and ASIN management APIs for deep competitor tracking.
  - name: products
    description: Product detail and timeline APIs backed by normalized snapshots.
  - name: events
    description: Event feed and event filtering APIs.
  - name: jobs
    description: Manual trigger and job status APIs.
  - name: webhooks
    description: External provider callbacks used to advance internal lifecycle state.
  - name: reports
    description: Weekly digest and reporting APIs.
paths:
  /health:
    get:
      tags: [dashboard]
      operationId: healthcheck
      summary: Health check
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /v1/webhooks/apify/runs:
    post:
      tags: [webhooks]
      operationId: receiveApifyRunWebhook
      summary: Receive an Apify actor run lifecycle callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApifyWebhookEnvelope'
      responses:
        '202':
          description: Webhook accepted or safely ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApifyWebhookAck'

  /v1/workspaces/{workspace_id}/dashboard/overview:
    get:
      tags: [dashboard]
      operationId: getDashboardOverview
      summary: Get dashboard overview for a workspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TimeframeQuery'
      responses:
        '200':
          description: Dashboard overview for the requested timeframe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/workspaces/{workspace_id}/category-trackers:
    get:
      tags: [category-trackers]
      operationId: listCategoryTrackers
      summary: List category trackers
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Paged category tracker list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTrackerListResponse'
    post:
      tags: [category-trackers]
      operationId: createCategoryTracker
      summary: Create a category tracker
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryTrackerCreateRequest'
      responses:
        '201':
          description: Category tracker created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTracker'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/workspaces/{workspace_id}/category-trackers/{tracker_code}:
    get:
      tags: [category-trackers]
      operationId: getCategoryTracker
      summary: Get category tracker detail
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TrackerCodePath'
      responses:
        '200':
          description: Category tracker detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTracker'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [category-trackers]
      operationId: updateCategoryTracker
      summary: Update mutable fields of a category tracker
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TrackerCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryTrackerUpdateRequest'
      responses:
        '200':
          description: Category tracker updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryTracker'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/category-trackers/{tracker_code}/snapshots/latest:
    get:
      tags: [category-trackers]
      operationId: getLatestCategorySnapshot
      summary: Get latest Top 50 snapshot for a category tracker
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TrackerCodePath'
      responses:
        '200':
          description: Latest category snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorySnapshot'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/competitor-trackers:
    get:
      tags: [competitor-trackers]
      operationId: listCompetitorTrackers
      summary: List competitor trackers
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Paged competitor tracker list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorTrackerListResponse'
    post:
      tags: [competitor-trackers]
      operationId: createCompetitorTracker
      summary: Create a competitor tracker
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorTrackerCreateRequest'
      responses:
        '201':
          description: Competitor tracker created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorTrackerDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/workspaces/{workspace_id}/competitor-trackers/{tracker_code}:
    get:
      tags: [competitor-trackers]
      operationId: getCompetitorTracker
      summary: Get competitor tracker detail
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TrackerCodePath'
      responses:
        '200':
          description: Competitor tracker detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorTrackerDetail'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [competitor-trackers]
      operationId: updateCompetitorTracker
      summary: Update mutable fields of a competitor tracker
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TrackerCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompetitorTrackerUpdateRequest'
      responses:
        '200':
          description: Competitor tracker updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorTrackerDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/competitor-trackers/{tracker_code}/tracked-asins:
    put:
      tags: [competitor-trackers]
      operationId: replaceTrackedAsins
      summary: Replace the ASIN set of a competitor tracker
      description: Replaces the full tracked ASIN list for the specified competitor tracker.
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/TrackerCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrackedAsinReplacementRequest'
      responses:
        '200':
          description: Tracked ASIN list replaced.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompetitorTrackerDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/products/{marketplace}/{asin}:
    get:
      tags: [products]
      operationId: getProductDetail
      summary: Get current product detail
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/MarketplacePath'
        - $ref: '#/components/parameters/AsinPath'
      responses:
        '200':
          description: Product detail built from the canonical product registry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/products/{marketplace}/{asin}/timeline:
    get:
      tags: [products]
      operationId: getProductTimeline
      summary: Get product timeline with daily or aggregated points
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/MarketplacePath'
        - $ref: '#/components/parameters/AsinPath'
        - $ref: '#/components/parameters/FromDateQuery'
        - $ref: '#/components/parameters/ToDateQuery'
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum: [DAILY, WEEKLY, MONTHLY]
            default: DAILY
      responses:
        '200':
          description: Product timeline with aligned events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTimelineResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/events:
    get:
      tags: [events]
      operationId: listEvents
      summary: List events with filters
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/FromDateQuery'
        - $ref: '#/components/parameters/ToDateQuery'
        - name: tracker_type
          in: query
          required: false
          schema:
            type: string
            enum: [CATEGORY, COMPETITOR]
        - name: tracker_code
          in: query
          required: false
          schema:
            type: string
        - name: marketplace
          in: query
          required: false
          schema:
            type: string
            pattern: '^amazon_[a-z]{2}$'
        - name: asin
          in: query
          required: false
          schema:
            type: string
            minLength: 10
            maxLength: 10
        - name: event_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/EventType'
        - $ref: '#/components/parameters/SeverityQuery'
      responses:
        '200':
          description: Paged event list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /v1/workspaces/{workspace_id}/jobs:
    get:
      tags: [jobs]
      operationId: listJobs
      summary: List tracking jobs
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/FromDateQuery'
        - $ref: '#/components/parameters/ToDateQuery'
        - name: tracker_type
          in: query
          required: false
          schema:
            type: string
            enum: [CATEGORY, COMPETITOR]
        - name: tracker_code
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/JobStatusQuery'
      responses:
        '200':
          description: Paged job list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
    post:
      tags: [jobs]
      operationId: createJob
      summary: Trigger a manual tracking job
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
      responses:
        '202':
          description: Manual tracking job accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/workspaces/{workspace_id}/jobs/{job_code}:
    get:
      tags: [jobs]
      operationId: getJob
      summary: Get tracking job detail
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/JobCodePath'
      responses:
        '200':
          description: Tracking job detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/workspaces/{workspace_id}/reports/weekly-digests:
    get:
      tags: [reports]
      operationId: listWeeklyDigests
      summary: List weekly digests
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
        - name: week_start
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paged weekly digest list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyDigestListResponse'

  /v1/workspaces/{workspace_id}/reports/weekly-digests/{digest_code}:
    get:
      tags: [reports]
      operationId: getWeeklyDigest
      summary: Get weekly digest detail
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
        - $ref: '#/components/parameters/DigestCodePath'
      responses:
        '200':
          description: Weekly digest detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyDigest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    WorkspaceIdPath:
      name: workspace_id
      in: path
      required: true
      schema:
        type: string
      description: Stable workspace identifier.
    TrackerCodePath:
      name: tracker_code
      in: path
      required: true
      schema:
        type: string
      description: Stable public tracker code.
    JobCodePath:
      name: job_code
      in: path
      required: true
      schema:
        type: string
    DigestCodePath:
      name: digest_code
      in: path
      required: true
      schema:
        type: string
    MarketplacePath:
      name: marketplace
      in: path
      required: true
      schema:
        type: string
        pattern: '^amazon_[a-z]{2}$'
      description: Normalized marketplace code such as `amazon_us`.
    AsinPath:
      name: asin
      in: path
      required: true
      schema:
        type: string
        minLength: 10
        maxLength: 10
    PageQuery:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    FromDateQuery:
      name: from_date
      in: query
      required: false
      schema:
        type: string
        format: date
    ToDateQuery:
      name: to_date
      in: query
      required: false
      schema:
        type: string
        format: date
    TimeframeQuery:
      name: timeframe
      in: query
      required: false
      schema:
        type: string
        enum: [DAILY, WEEKLY, MONTHLY]
        default: WEEKLY
    SeverityQuery:
      name: severity
      in: query
      required: false
      schema:
        type: string
        enum: [LOW, MEDIUM, HIGH]
    JobStatusQuery:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/JobStatus'
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Optional idempotency key for write operations.
    AuthorizationHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
      description: Optional bearer token used to verify Apify webhook callbacks.

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: VALIDATION_ERROR
            message: Invalid request body.
            details:
              field: scope.browse_node_id
              reason: Either browse_node_id or browse_node_url must be provided.
            request_id: req_01J8X9XYZ
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: Resource not found.
            request_id: req_01J8X9XYZ
    Conflict:
      description: Request conflicts with an existing logical resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CONFLICT
            message: A job already exists for tracker `ct_bottle_warmers_us` on 2026-04-03.
            request_id: req_01J8X9XYZ
    Forbidden:
      description: Request is not allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FORBIDDEN
            message: Invalid webhook secret.
            request_id: req_01J8X9XYZ

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string

    Marketplace:
      type: string
      pattern: '^amazon_[a-z]{2}$'
      examples: [amazon_us, amazon_de]

    TrackerStatus:
      type: string
      enum: [ACTIVE, PAUSED, ARCHIVED]

    JobStatus:
      type: string
      enum:
        - QUEUED
        - DISPATCHING
        - RUNNING_EXTERNAL
        - IMPORTING
        - PROCESSING
        - SUCCESS
        - PARTIAL_SUCCESS
        - FAILED

    ExternalRunStatus:
      type: string
      enum:
        - READY
        - RUNNING
        - SUCCEEDED
        - FAILED
        - TIMED_OUT
        - ABORTED

    ApifyWebhookEnvelope:
      type: object
      additionalProperties: true
      properties:
        eventType:
          type: string
        eventData:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        resourceId:
          type: string
        resource:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        payload:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string
        data:
          oneOf:
            - type: object
              additionalProperties: true
            - type: string

    ApifyWebhookAck:
      type: object
      required: [status, source]
      properties:
        status:
          type: string
          enum: [ACCEPTED, IGNORED]
        source:
          type: string
          enum: [WEBHOOK]
        apify_run_id:
          type: string
          nullable: true
        tracking_job_code:
          type: string
          nullable: true
        provider_status:
          allOf:
            - $ref: '#/components/schemas/ExternalRunStatus'
          nullable: true
        job_status:
          allOf:
            - $ref: '#/components/schemas/JobStatus'
          nullable: true

    EventType:
      type: string
      enum:
        - NEW_ENTRANT_TOP50
        - RETURNING_TOP50
        - EXIT_TOP50
        - ENTER_TOP10
        - EXIT_TOP10
        - PRICE_CHANGED
        - PROMOTION_CHANGED
        - TITLE_CHANGED
        - MAIN_IMAGE_CHANGED
        - VARIATIONS_ADDED
        - CONTENT_CHANGED
        - AVAILABILITY_CHANGED
        - BUY_BOX_CHANGED

    DashboardOverview:
      type: object
      required:
        - timeframe
        - generated_at
        - summary
        - top_events
        - top_threats
        - category_highlights
        - competitor_highlights
      properties:
        timeframe:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY]
        generated_at:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/DashboardOverviewSummary'
        top_events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        top_threats:
          type: array
          items:
            $ref: '#/components/schemas/Threat'
        category_highlights:
          type: array
          items:
            $ref: '#/components/schemas/CategoryHighlight'
        competitor_highlights:
          type: array
          items:
            $ref: '#/components/schemas/CompetitorHighlight'

    DashboardOverviewSummary:
      type: object
      required:
        - active_category_tracker_count
        - active_competitor_tracker_count
        - tracked_product_count
        - new_entrant_count
        - returning_count
        - top10_enter_count
        - price_change_count
        - listing_change_count
      properties:
        active_category_tracker_count:
          type: integer
        active_competitor_tracker_count:
          type: integer
        tracked_product_count:
          type: integer
        new_entrant_count:
          type: integer
        returning_count:
          type: integer
        top10_enter_count:
          type: integer
        price_change_count:
          type: integer
        listing_change_count:
          type: integer

    CategoryHighlight:
      type: object
      required: [tracker_code, tracker_name, new_entrant_count, exit_count, top10_enter_count]
      properties:
        tracker_code:
          type: string
        tracker_name:
          type: string
        new_entrant_count:
          type: integer
        exit_count:
          type: integer
        top10_enter_count:
          type: integer

    CompetitorHighlight:
      type: object
      required: [tracker_code, tracker_name, price_change_count, availability_change_count, listing_change_count]
      properties:
        tracker_code:
          type: string
        tracker_name:
          type: string
        price_change_count:
          type: integer
        availability_change_count:
          type: integer
        listing_change_count:
          type: integer

    CategoryTrackerListResponse:
      type: object
      required: [items, page, page_size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryTracker'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    CategoryTracker:
      type: object
      required:
        - tracker_code
        - name
        - marketplace
        - scope
        - tracking_config
        - schedule
        - status
        - stats
        - created_at
        - updated_at
      properties:
        tracker_code:
          type: string
        name:
          type: string
        marketplace:
          $ref: '#/components/schemas/Marketplace'
        scope:
          $ref: '#/components/schemas/CategoryScope'
        tracking_config:
          $ref: '#/components/schemas/CategoryTrackingConfig'
        schedule:
          $ref: '#/components/schemas/TrackerSchedule'
        status:
          $ref: '#/components/schemas/TrackerStatus'
        stats:
          $ref: '#/components/schemas/CategoryTrackerStats'
        latest_snapshot_summary:
          $ref: '#/components/schemas/CategoryTrackerLatestSnapshotSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CategoryTrackerCreateRequest:
      type: object
      required: [name, marketplace, scope, schedule]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        marketplace:

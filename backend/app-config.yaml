app:
  name: "Market Tracker API"
  api_prefix: "/v1"
  seed_demo_data: false

apify:
  webhook_url: ""
  poll_batch_size: 25
  poll_interval_secs: 60
  import_batch_size: 200
  import_worker_batch_size: 10
  import_worker_interval_secs: 30
  actor_pools:
    category:
      saswave:
        actor_id: "saswave/amazon-product-scraper"
        task_id: ""
        name: "Saswave Amazon Scraper"
        adapter: "saswave_category"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
      junglee:
        actor_id: "junglee/amazon-bestsellers"
        task_id: ""
        name: "Junglee Bestsellers"
        adapter: "junglee_category"
        build: "latest"
        memory_mbytes: 4096
        enabled: false
        priority: 2
        input_adapter:
          field_map:
            search_url: "categoryUrls"
            max_pages: "maxItemsPerStartUrl"
          wrap_array: "categoryUrls"
      crawlerbros:
        actor_id: "crawlerbros/amazon-bestseller-scraper"
        task_id: ""
        name: "CrawlerBros Bestseller Scraper"
        adapter: "crawlerbros_category"
        build: "latest"
        memory_mbytes: 4096
        enabled: false
        priority: 3
        input_adapter:
          field_map:
            search_url: "categoryUrls"
            max_pages: "maxItems"
          wrap_array: "categoryUrls"
      get_leads:
        actor_id: "get-leads/all-in-one-amazon-scraper"
        task_id: ""
        name: "GetLeads Amazon Scraper"
        adapter: "get_leads_category"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 2
        input_adapter:
          field_map:
            search_url: "urls"
            marketplace_code: "marketplace"
            top_n: "maxProducts"
            max_pages: "pages"
          wrap_array: "urls"
          static_fields:
            detailLevel: "basic"
    competitor:
      saswave:
        actor_id: "saswave/amazon-product-scraper"
        task_id: ""
        name: "Saswave Amazon Scraper"
        adapter: "saswave_competitor"
        build: "latest"
        memory_mbytes: 4096
        enabled: false
        priority: 1
      junglee_crawler:
        actor_id: "junglee/amazon-crawler"
        task_id: ""
        name: "Junglee Product Crawler"
        adapter: "junglee_product"
        build: "latest"
        memory_mbytes: 4096
        enabled: false
        priority: 2
        input_adapter:
          field_map:
            asins: "categoryOrProductUrls"
            max_pages: "maxSearchPagesPerStartUrl"
      junglee_asins:
        actor_id: "junglee/amazon-asins-scraper"
        task_id: ""
        name: "Junglee ASIN Scraper"
        adapter: "junglee_asins"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
    deals:
      deals_scraper:
        actor_id: "hJNp8X1wuz14Wc5wU"
        task_id: ""
        name: "Deals Scraper"
        adapter: "deals_scraper"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1

storage:
  raw_batch_offload_enabled: false
  raw_batch_offload_min_items: 200
  local_object_store_root: "outputs/object-store"

workers:
  scheduler_interval_secs: 60
  digest_interval_secs: 3600

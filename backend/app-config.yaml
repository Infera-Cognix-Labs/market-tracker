app:
  name: "Market Tracker API"
  api_prefix: "/v1"
  seed_demo_data: false

apify:
  webhook_url: ""
  poll_batch_size: 25
  poll_interval_secs: 60
  import_batch_size: 200
  import_worker_batch_size: 10
  import_worker_interval_secs: 30
  actor_pools:
    category:
      saswave:
        actor_id: "saswave/amazon-product-scraper"
        task_id: ""
        name: "Saswave Amazon Scraper"
        adapter: "saswave_category"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
      prodiger:
        actor_id: "prodiger/amazon-product-scraper"
        task_id: ""
        name: "Prodiger Amazon Scraper (Pay-Per-Event)"
        adapter: "prodiger_category"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 2
        input_adapter:
          field_map:
            search_url: "startUrls"
            top_n: "maxProductsPerSearch"
            max_pages: "maxSearchPages"
          wrap_object:
            startUrls: "url"
          marketplace_map:
            amazon_us: "US"
            amazon_uk: "UK"
            amazon_de: "DE"
            amazon_fr: "FR"
            amazon_it: "IT"
            amazon_es: "ES"
            amazon_ca: "CA"
            amazon_jp: "JP"
            amazon_in: "IN"
            amazon_au: "AU"
            amazon_mx: "MX"
    competitor:
      junglee_asins:
        actor_id: "junglee/amazon-asins-scraper"
        task_id: ""
        name: "Junglee ASIN Scraper"
        adapter: "junglee_asins"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
    keyword:
      harvestlab:
        actor_id: "harvestlab/amazon-scraper"
        task_id: ""
        name: "Harvestlab Amazon Scraper"
        adapter: "harvestlab_keyword"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
        input_adapter:
          field_map:
            keyword: "searchQuery"
            top_n: "maxProducts"
            amazon_domain: "amazonDomain"
          marketplace_map:
            amazon_us: "amazon.com"
            amazon_uk: "amazon.co.uk"
            amazon_de: "amazon.de"
            amazon_fr: "amazon.fr"
            amazon_it: "amazon.it"
            amazon_es: "amazon.es"
            amazon_ca: "amazon.ca"
            amazon_jp: "amazon.co.jp"
            amazon_in: "amazon.in"
            amazon_au: "amazon.com.au"
            amazon_mx: "amazon.com.mx"
    deals:
      deals_scraper:
        actor_id: "hJNp8X1wuz14Wc5wU"
        task_id: ""
        name: "Deals Scraper"
        adapter: "deals_scraper"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1

storage:
  raw_batch_offload_enabled: false
  raw_batch_offload_min_items: 200
  local_object_store_root: "outputs/object-store"

workers:
  scheduler_interval_secs: 60
  digest_interval_secs: 3600

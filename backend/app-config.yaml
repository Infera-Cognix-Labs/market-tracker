app:
  name: "Market Tracker API"
  api_prefix: "/v1"
  seed_demo_data: false

apify:
  webhook_url: ""
  poll_batch_size: 25
  poll_interval_secs: 60
  import_batch_size: 200
  import_worker_batch_size: 10
  import_worker_interval_secs: 30
  stuck_processing_reclaim_secs: 900
  actor_pools:
    category:
      junglee_bestsellers:
        actor_id: "junglee/amazon-bestsellers"
        task_id: ""
        name: "Junglee Amazon Bestsellers Scraper"
        adapter: "junglee_bestsellers"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
        input_adapter:
          field_map:
            search_url: "categoryUrls"
            top_n: "maxItemsPerStartUrl"
          wrap_array: "categoryUrls"
          static_fields:
            detailedInformation: true
            depthOfCrawl: 1
            language: "en"
    competitor:
      junglee_asins:
        actor_id: "junglee/amazon-asins-scraper"
        task_id: ""
        name: "Junglee ASIN Scraper"
        adapter: "junglee_asins"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
        input_adapter:
          field_map:
            amazon_domain: "amazonDomain"
          marketplace_map:
            amazon_us: "amazon.com"
            amazon_uk: "amazon.co.uk"
            amazon_de: "amazon.de"
            amazon_fr: "amazon.fr"
            amazon_it: "amazon.it"
            amazon_es: "amazon.es"
            amazon_ca: "amazon.ca"
            amazon_jp: "amazon.co.jp"
            amazon_in: "amazon.in"
            amazon_au: "amazon.com.au"
            amazon_mx: "amazon.com.mx"
    keyword:
      harvestlab:
        actor_id: "harvestlab/amazon-scraper"
        task_id: ""
        name: "Harvestlab Amazon Scraper"
        adapter: "harvestlab_keyword"
        build: "latest"
        memory_mbytes: 4096
        enabled: true
        priority: 1
        input_adapter:
          field_map:
            keyword: "searchQuery"
            top_n: "maxProducts"
            amazon_domain: "amazonDomain"
          marketplace_map:
            amazon_us: "amazon.com"
            amazon_uk: "amazon.co.uk"
            amazon_de: "amazon.de"
            amazon_fr: "amazon.fr"
            amazon_it: "amazon.it"
            amazon_es: "amazon.es"
            amazon_ca: "amazon.ca"
            amazon_jp: "amazon.co.jp"
            amazon_in: "amazon.in"
            amazon_au: "amazon.com.au"
            amazon_mx: "amazon.com.mx"

storage:
  raw_batch_offload_enabled: false
  raw_batch_offload_min_items: 200
  local_object_store_root: "outputs/object-store"

workers:
  scheduler_interval_secs: 60
  digest_interval_secs: 3600

llm:
  enabled: true
  provider: "openai"
  model: "gpt-4o-mini"
  max_tokens: 2500
  temperature: 0.3
  timeout_secs: 30
  retry_attempts: 2

name: frontend CI

on: 
  pull_request: 
    branches:
      - develop
    paths:
      - "frontend/**"

defaults:
  run:
    working-directory: frontend

jobs:
  ci:
    name: lint, type check, build check
    runs-on: ubuntu-latest

    steps:
      - name: Clone code
        uses: actions/checkout@v4

      - name: Set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint test
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build
        env:
          CI: true
          
